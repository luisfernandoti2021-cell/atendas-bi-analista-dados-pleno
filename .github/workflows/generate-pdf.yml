name: Generate PDF report

on:
  workflow_dispatch: {}
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pandoc and TeX
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex

      - name: Generate PDF from README_REPORT.md
        run: |
          pandoc README_REPORT.md -o README_REPORT.pdf

      - name: Get release by tag v1.0
        id: getrel
        uses: actions/github-script@v6
        with:
          script: |
            const tag = 'v1.0';
            const release = await github.rest.repos.getReleaseByTag({ owner: context.repo.owner, repo: context.repo.repo, tag });
            core.setOutput('upload_url', release.data.upload_url);

      - name: Upload README_REPORT.pdf to release v1.0
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.getrel.outputs.upload_url }}
          asset_path: README_REPORT.pdf
          asset_name: README_REPORT.pdf
          asset_content_type: application/pdf
